# Architecture-lint exemptions registry.
#
# Each `[[exemption]]` entry suppresses a specific lint against a specific
# workspace-relative file path. Exemptions live here, in one place, so adding
# one requires a code-review trail rather than being scattered as inline
# annotations across the workspace.
#
# Adding an exemption is a deliberate architectural decision and SHOULD be
# accompanied by a follow-up task (see `reason` field). Removing an exemption
# is encouraged whenever the underlying issue is resolved.
#
# Schema:
#   lint   = "<lint-name>"   # one of the kebab-case lint names emitted by main.rs
#   file   = "<path>"        # workspace-relative, forward slashes (POSIX-style)
#   reason = "<why>"         # human-readable justification + follow-up plan

# --------------------------------------------------------------------------
# Phase 1.x rollout debt for the failure-class lint (PLAN §1.13).
#
# All 81 Tier-1 + Tier-2 crates currently lack the `//! Failure class: <kind>`
# declaration in their lib.rs. The lint was introduced 2026-05-05 as part of
# Phase 0.2 architecture enforcement; the declarations land per crate as each
# gets its first real implementation per IMPLEMENTATION.md phase order.
#
# To clear an exemption: add `//! Failure class: <kind>` (one of recoverable,
# snapshot-recoverable, plugin-fatal, session-fatal, kernel-fatal) to the
# crate's `src/lib.rs` doc-comment block, then delete the matching entry
# below. The lint will start enforcing the rule on that crate immediately.
# --------------------------------------------------------------------------

[[exemption]]
lint = "failure-class"
file = "crates/anim-clip/Cargo.toml"
reason = "Phase 1.x rollout debt - declaration added when crate gets first real implementation per IMPLEMENTATION.md."

