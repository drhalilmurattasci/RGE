# cargo-deny configuration — workspace dependency governance
# Wired into CI as part of Phase 0.2 architecture enforcement (per IMPLEMENTATION.md).

[graph]
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "wasm32-unknown-unknown" },
]
all-features          = false
no-default-features   = false

[advisories]
db-path  = "~/.cargo/advisory-db"
db-urls  = ["https://github.com/rustsec/advisory-db"]
ignore   = [
    # RUSTSEC-2024-0436 -- `paste` is unmaintained (an advisory, not a
    # vulnerability). Transitive via egui_dock / simba; no safe upgrade path
    # as of 2026-05-17. Re-evaluate by 2026-08-17, or sooner once an upstream
    # migrates off `paste`.
    "RUSTSEC-2024-0436",
]

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
# Registry wildcard version requirements ("*") are denied -- an unattended
# dispatch must not be able to add one and still pass the supply-chain gate.
# Internal path / workspace crate edges legitimately omit a registry version;
# allow-wildcard-paths exempts those so they do not fail the gate.
wildcards            = "deny"
allow-wildcard-paths = true
highlight            = "all"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-git        = [
    # `csgrs 0.20.1` still pins yanked `core2`; the workspace overrides it to
    # the archived v0.4.0-content commit. See the root Cargo.toml patch note.
    "https://github.com/bbqsrc/core2.git",
]
